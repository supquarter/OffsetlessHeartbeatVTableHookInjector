<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: #1E1E1E; font-family: "Segoe UI", sans-serif; }
#container { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="container"></div>
<script>
var require = { paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs' } };
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.js"></script>
<script>
require(['vs/editor/editor.main'], function () {
    monaco.editor.defineTheme('injectorDark', {
        base: 'vs-dark',
        inherit: true,
        rules: [
            { token: 'comment', foreground: '6A9955', fontStyle: 'italic' },
            { token: 'keyword', foreground: '569CD6' },
            { token: 'string', foreground: 'CE9178' },
            { token: 'number', foreground: 'B5CEA8' },
            { token: 'function', foreground: 'DCDCAA' },
            { token: 'type', foreground: '4EC9B0' },
            { token: 'variable', foreground: '9CDCFE' },
            { token: 'operator', foreground: 'D4D4D4' },
            { token: 'delimiter', foreground: 'D4D4D4' }
        ],
        colors: {
            'editor.background': '#1E1E1E',
            'editor.foreground': '#D4D4D4',
            'editor.lineHighlightBackground': '#2A2D2E',
            'editor.selectionBackground': '#264F78',
            'editorCursor.foreground': '#AEAFAD',
            'editorLineNumber.foreground': '#858585',
            'editorLineNumber.activeForeground': '#C6C6C6',
            'editor.selectionHighlightBackground': '#2D4F6E',
            'editor.inactiveSelectionBackground': '#3A3D41',
            'editorWidget.background': '#252526',
            'editorWidget.border': '#454545',
            'minimap.background': '#1E1E1E'
        }
    });

    monaco.languages.registerCompletionItemProvider('lua', {
        provideCompletionItems: function (model, position) {
            var word = model.getWordUntilPosition(position);
            var range = {
                startLineNumber: position.lineNumber,
                endLineNumber: position.lineNumber,
                startColumn: word.startColumn,
                endColumn: word.endColumn
            };

            var suggestions = [
                {
                    label: 'print',
                    kind: monaco.languages.CompletionItemKind.Function,
                    insertText: 'print(${1:...})',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    range: range,
                    detail: 'Prints values to output'
                },
                {
                    label: 'warn',
                    kind: monaco.languages.CompletionItemKind.Function,
                    insertText: 'warn(${1:...})',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    range: range,
                    detail: 'Prints a warning'
                },
                {
                    label: 'task.spawn',
                    kind: monaco.languages.CompletionItemKind.Function,
                    insertText: 'task.spawn(${1:function})\n\t${2:-- body}\nend)',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    range: range,
                    detail: 'Spawns a new task'
                },
                {
                    label: 'task.wait',
                    kind: monaco.languages.CompletionItemKind.Function,
                    insertText: 'task.wait(${1:seconds})',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    range: range,
                    detail: 'Yields for n seconds'
                },
                {
                    label: 'task.defer',
                    kind: monaco.languages.CompletionItemKind.Function,
                    insertText: 'task.defer(${1:function})\n\t${2:-- body}\nend)',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    range: range,
                    detail: 'Defers execution'
                },
                {
                    label: 'game',
                    kind: monaco.languages.CompletionItemKind.Variable,
                    insertText: 'game',
                    range: range,
                    detail: 'The DataModel service'
                },
                {
                    label: 'workspace',
                    kind: monaco.languages.CompletionItemKind.Variable,
                    insertText: 'workspace',
                    range: range,
                    detail: 'The Workspace service'
                },
                {
                    label: 'Players',
                    kind: monaco.languages.CompletionItemKind.Class,
                    insertText: 'game:GetService("Players")',
                    range: range,
                    detail: 'Players service'
                },
                {
                    label: 'for',
                    kind: monaco.languages.CompletionItemKind.Snippet,
                    insertText: 'for ${1:i} = ${2:1}, ${3:10} do\n\t${4:-- body}\nend',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    range: range
                },
                {
                    label: 'if',
                    kind: monaco.languages.CompletionItemKind.Snippet,
                    insertText: 'if ${1:condition} then\n\t${2:-- body}\nend',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    range: range
                },
                {
                    label: 'function',
                    kind: monaco.languages.CompletionItemKind.Snippet,
                    insertText: 'function ${1:name}(${2:args})\n\t${3:-- body}\nend',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    range: range
                },
                {
                    label: 'local function',
                    kind: monaco.languages.CompletionItemKind.Snippet,
                    insertText: 'local function ${1:name}(${2:args})\n\t${3:-- body}\nend',
                    insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                    range: range
                }
            ];

            return { suggestions: suggestions };
        }
    });

    window.editor = monaco.editor.create(document.getElementById('container'), {
        value: '-- Enter your Luau/Lua script here\nprint("Hello from Injector UI!")\n\n-- Examples:\n-- game:GetService("Players")\n-- task.wait(1)\n-- print(workspace.Name)\n\nlocal function greet(name)\n    print("Hello, " .. name)\nend\n\ngreet("World")',
        language: 'lua',
        theme: 'injectorDark',
        fontSize: 14,
        fontFamily: "Consolas, 'Cascadia Code', 'Courier New', monospace",
        minimap: { enabled: true, scale: 1, showSlider: 'mouseover' },
        automaticLayout: true,
        scrollBeyondLastLine: false,
        lineNumbers: 'on',
        renderWhitespace: 'selection',
        tabSize: 4,
        insertSpaces: true,
        wordWrap: 'off',
        folding: true,
        foldingStrategy: 'indentation',
        bracketPairColorization: { enabled: true },
        smoothScrolling: true,
        cursorBlinking: 'smooth',
        cursorSmoothCaretAnimation: 'on',
        padding: { top: 8 }
    });

    editor.addAction({
        id: 'execute-script',
        label: 'Execute Script',
        keybindings: [monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter],
        run: function () { }
    });

    window.getEditorContent = function () {
        return editor.getValue();
    };

    window.setEditorContent = function (content) {
        editor.setValue(content);
    };

    window.focusEditor = function () {
        editor.focus();
    };
});
</script>
</body>
</html>
